<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f3f7ff">
<title>Emilka — Łowczyni Wiedzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&family=Baloo+2:wght@600;700;800&family=Quicksand:wght@500;600;700&family=Poppins:wght@600;700;800&family=Mulish:wght@600;700;800&family=Comfortaa:wght@600;700&family=Varela+Round&display=swap" rel="stylesheet">
<style>
  :root{
    --magenta:#ff4d9d; --pink:#ff7ac6; --cyan:#22bfe6; --violet:#9b59e6;
    --green:#58cc62; --green-d:#46a852; --gold:#ffc83d; --gold-d:#e8a90c;
    --blue:#2bb3f0; --blue-d:#1f8fc4;
    --text:#4a3a6b; --muted:#9385b3; --card:#ffffff; --line:#ece4f7;
    --shadow:rgba(120,90,170,.18); --btnsh:#d3c8ea;
    --bg:linear-gradient(180deg,#f2f6ff 0%,#e9edff 100%);
    --fhead:'Fredoka', sans-serif; --fbody:'Nunito', sans-serif;
    --cH:#ffce5a; --cHd:#efab2e; --cHl:#ffe49b;
    --cSkL:#fff1e3; --cSk:#ffe2c2; --cSkD:#f1bf95;
    --mapTint:rgba(255,77,157,.08);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ margin:0; height:100%; overflow:hidden; touch-action:manipulation;
    font-family:var(--fbody); font-weight:700; color:var(--text); background:var(--bg); transition:background .5s ease; }
  h1,h2,h3,.fhead{ font-family:var(--fhead); }
  #app{ position:fixed; inset:0; display:flex; flex-direction:column; }

  /* soft decorative blobs */
  .sky{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .sky b{ position:absolute; border-radius:50%; filter:blur(8px); opacity:.45; animation:float 9s infinite ease-in-out; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

  .screen{ position:relative; z-index:1; flex:1; display:none; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); min-height:0; }
  .screen.on{ display:flex; animation:fade .35s ease; }
  @keyframes fade{ from{opacity:0;transform:scale(.98)} to{opacity:1;transform:scale(1)} }

  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; gap:10px; flex:none; }
  .iconbtn{ width:52px; height:52px; border-radius:18px; border:none; font-size:24px; cursor:pointer; color:var(--text);
    background:var(--card); box-shadow:0 4px 0 var(--btnsh); }
  .iconbtn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--btnsh); }
  .stars{ font-family:var(--fhead); font-size:clamp(19px,4.6vw,28px); font-weight:700; color:#9a6a00;
    background:linear-gradient(180deg,#ffe07a,#ffc83d); padding:7px 18px; border-radius:18px; display:flex; align-items:center; gap:6px; box-shadow:0 4px 0 var(--gold-d); }
  .ttl{ font-family:var(--fhead); font-size:clamp(18px,5vw,26px); font-weight:700; }

  /* ---------- HOME ---------- */
  #home{ align-items:stretch; justify-content:flex-start; padding:0; }
  .hometop{ display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top) + 10px) 14px 8px; flex:none; }
  .avatar{ border-radius:50%; overflow:hidden; position:relative; cursor:pointer; flex:none;
    background:radial-gradient(circle at 50% 36%, #fff 0%, #f4ecff 58%, #e6d9f6 100%);
    border:4px solid #fff; box-shadow:0 6px 16px rgba(120,90,170,.28), inset 0 0 0 2px rgba(155,89,230,.16);
    display:flex; align-items:flex-end; justify-content:center; }
  .avatar:active{ transform:scale(.95); }
  .avatar-sm{ width:clamp(56px,14vw,76px); aspect-ratio:1/1; border-width:3px; }
  .avatar-sm #emiHome{ width:90%; margin-bottom:-9%; }
  #emiHome{ position:relative; }
  .hi{ display:flex; flex-direction:column; line-height:1.12; min-width:0; }
  .hi-name{ font-family:var(--fhead); font-weight:700; font-size:clamp(16px,4.2vw,22px); color:var(--text); }
  .hi-sub{ font-size:clamp(11px,2.8vw,13px); color:var(--muted); font-weight:700; }
  .htspacer{ flex:1; }
  .ddwrap{ position:relative; flex:none; }
  .dd-btn{ display:flex; align-items:center; gap:6px; border:none; cursor:pointer; border-radius:24px; padding:9px 14px;
    font-family:var(--fhead); font-weight:700; font-size:clamp(12px,3vw,15px); color:#7a4d00;
    background:linear-gradient(160deg,#ffd23d,#e8a90c); box-shadow:0 4px 0 #b07d00; white-space:nowrap; }
  .dd-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #b07d00; }
  .dd-arr{ font-size:.8em; }
  .dd-menu{ position:absolute; top:calc(100% + 8px); right:0; z-index:20; display:none; flex-direction:column; gap:4px;
    background:var(--card); border-radius:18px; padding:8px; box-shadow:0 12px 30px var(--shadow); min-width:184px; }
  .dd-menu.on{ display:flex; }
  .dd-opt{ border:none; cursor:pointer; text-align:left; border-radius:12px; padding:11px 14px; font-family:var(--fhead);
    font-weight:700; font-size:15px; color:var(--text); background:transparent; }
  .dd-opt.on{ background:#f1eaff; color:var(--violet); }
  .ib-sm{ width:44px; height:44px; font-size:20px; flex:none; }
  .home-scroll{ flex:1; min-height:0; overflow-y:auto; padding:0 14px 30px; display:flex; flex-direction:column; }
  .sec-h{ font-family:var(--fhead); font-weight:700; color:var(--text); font-size:clamp(17px,4.4vw,22px); margin:14px 4px 8px; }
  /* learning path */
  .path-scroll{ display:flex; gap:14px; overflow-x:auto; padding:8px 4px 16px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
  .path-node{ flex:none; scroll-snap-align:start; border:none; cursor:pointer; border-radius:24px; padding:14px 12px;
    width:clamp(118px,30vw,148px); background:var(--card); box-shadow:0 8px 0 var(--btnsh);
    display:flex; flex-direction:column; align-items:center; gap:7px; text-align:center; position:relative; transition:transform .12s; }
  .path-node:active{ transform:translateY(4px); box-shadow:0 4px 0 var(--btnsh); }
  .path-node .pn-ic{ font-size:clamp(34px,9vw,50px); line-height:1; }
  .path-node .pn-t{ font-family:var(--fhead); font-weight:700; font-size:clamp(12px,3.2vw,15px); color:var(--text); line-height:1.15; }
  .path-node .pn-d{ font-size:11px; font-weight:700; color:var(--muted); }
  .path-node .pn-badge{ position:absolute; top:-8px; right:-8px; }
  .path-node.done{ background:#eafaf0; box-shadow:0 8px 0 #bfe8cf; }
  .path-node.done .pn-badge{ width:30px; height:30px; border-radius:50%; background:#58cc62; color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; box-shadow:0 3px 0 #3da64a; font-size:17px; }
  .path-node.locked{ opacity:.6; }
  .path-node.locked .pn-badge{ font-size:20px; top:-6px; }
  .path-node.cur{ width:clamp(170px,46vw,210px); background:linear-gradient(160deg,#9b6bff,#7338d6); box-shadow:0 9px 0 #5e22a0; }
  .path-node.cur .pn-t,.path-node.cur .pn-d{ color:#fff; }
  .path-node.cur .pn-go{ margin-top:3px; background:#fff; color:var(--violet); font-family:var(--fhead); font-weight:700;
    border-radius:20px; padding:8px 22px; font-size:clamp(15px,4vw,19px); box-shadow:0 4px 0 rgba(60,30,110,.25); }
  /* category tiles */
  .cat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .ctile{ border:none; cursor:pointer; border-radius:24px; padding:16px 14px; color:#fff;
    display:flex; flex-direction:column; align-items:center; gap:7px; text-align:center;
    box-shadow:0 8px 0 var(--leg,#c9bfe0); transition:transform .12s; }
  .ctile:active{ transform:translateY(4px); box-shadow:0 4px 0 var(--leg,#c9bfe0); }
  .ctile .ct-ic{ width:clamp(48px,13vw,68px); height:clamp(48px,13vw,68px); }
  .ctile .ct-ic .emo3d{ width:100%; height:100%; }
  .ctile .ct-n{ font-family:var(--fhead); font-weight:700; font-size:clamp(15px,4vw,20px); }
  .ctile .ct-p{ font-size:clamp(11px,2.8vw,13px); font-weight:700; opacity:.95; }
  .ctile .ct-bar{ width:100%; height:8px; border-radius:5px; background:rgba(255,255,255,.4); overflow:hidden; }
  .ctile .ct-bar i{ display:block; height:100%; background:#fff; border-radius:5px; min-width:8px; transition:width .4s; }
  .protabs{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:2px 10px 8px; flex:none; }
  .protab{ padding:9px 16px; border-radius:30px; border:none; font-family:var(--fhead); font-weight:700; cursor:pointer;
    font-size:clamp(13px,3.4vw,16px); color:var(--text); background:var(--card); box-shadow:0 3px 0 var(--btnsh); }
  .protab.on{ background:var(--violet); color:#fff; box-shadow:0 3px 0 #5e22a0; }
  .worlds{ display:flex; gap:clamp(10px,2.6vw,22px); flex-wrap:wrap; justify-content:center; max-width:680px; }
  .world{ width:clamp(102px,22vw,160px); aspect-ratio:1/1; border-radius:28px; border:none; cursor:pointer; color:#fff;
    font-family:var(--fhead); font-weight:700; font-size:clamp(14px,3.2vw,20px);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    box-shadow:0 9px 0 var(--leg,#c9bfe0),0 12px 22px var(--shadow); transition:transform .12s, box-shadow .12s; }
  .world .ico{ font-size:clamp(34px,8vw,58px); line-height:1; }
  .world:active{ transform:translateY(7px); box-shadow:0 2px 0 var(--leg,#c9bfe0); }
  .w-letters{ background:linear-gradient(160deg,#ff6fb0,#ff3d8e); --leg:#c41f6b; }
  .w-numbers{ background:linear-gradient(160deg,#46c8f5,#1f8fc4); --leg:#15688f; }
  .w-logic{ background:linear-gradient(160deg,#b06bff,#8338d6); --leg:#5e22a0; }
  .w-tf{ background:linear-gradient(160deg,#34d6c0,#159c8b); --leg:#0e6f63; }
  .world .wsub{ font-size:11px; opacity:.92; font-weight:700; margin-top:3px; }
  .tf-intro{ text-align:center; font-family:var(--fhead); font-weight:700; color:var(--muted); font-size:clamp(15px,4vw,20px); padding:6px; flex:none; }
  .menu-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .pill{ border:none; cursor:pointer; border-radius:30px; padding:12px 20px; color:var(--text); font-family:var(--fhead);
    font-weight:700; font-size:clamp(13px,3.2vw,17px); background:var(--card); box-shadow:0 4px 0 var(--btnsh);
    display:flex; align-items:center; gap:6px; }
  .pill:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--btnsh); }
  .pill.gold{ background:linear-gradient(180deg,#ffe07a,#ffc83d); color:#9a6a00; box-shadow:0 4px 0 var(--gold-d); }
  .name-input{ width:100%; max-width:320px; border:3px solid #e7dbf7; border-radius:16px; padding:12px 16px;
    font-family:var(--fhead); font-weight:700; font-size:clamp(16px,4vw,20px); color:var(--text); background:var(--card); outline:none; }
  .name-input:focus{ border-color:var(--violet); }
  .set-sec{ font-family:var(--fhead); font-weight:700; color:var(--violet); font-size:18px; margin:16px 0 4px; }

  /* ---------- MAP (Duolingo-style) ---------- */
  .map-banner{ display:flex; align-items:center; gap:12px; padding:4px 18px 8px; flex:none; justify-content:center; }
  .map-banner .emi{ width:clamp(54px,12vw,82px); flex:none; }
  .map-banner .bubble{ background:var(--card); color:var(--text); border-radius:18px; padding:10px 16px; font-family:var(--fhead);
    font-weight:700; font-size:clamp(14px,3.6vw,20px); box-shadow:0 4px 0 var(--btnsh); position:relative; }
  .map-banner .bubble:after{ content:""; position:absolute; left:-10px; top:18px; border:10px solid transparent; border-right-color:var(--card); }
  .map-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; position:relative; -webkit-overflow-scrolling:touch; background:var(--mapTint); }
  .map-inner{ position:relative; margin:0 auto; max-width:480px; }
  .trail{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .node{ position:absolute; width:72px; height:72px; border-radius:50%; transform:translateX(-50%); border:none;
    font-family:var(--fhead); font-weight:700; font-size:25px; color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 7px 0 rgba(0,0,0,.18); }
  .node:active{ transform:translateX(-50%) translateY(4px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .node.lock{ background:#e2dcf0; color:#b3a6d0; box-shadow:0 7px 0 #cfc6e6; }
  .node.cur.letters,.node.done.letters{}
  .node.lt{ background:linear-gradient(160deg,#ff6fb0,#ff3d8e); box-shadow:0 7px 0 #c41f6b; }
  .node.nu{ background:linear-gradient(160deg,#46c8f5,#1f8fc4); box-shadow:0 7px 0 #166d97; }
  .node.lo{ background:linear-gradient(160deg,#b06bff,#8338d6); box-shadow:0 7px 0 #5e22a0; }
  .node.tf{ background:linear-gradient(160deg,#34d6c0,#159c8b); box-shadow:0 7px 0 #0e6f63; }
  .node.done{ background:linear-gradient(160deg,#6fe07a,#46a852)!important; box-shadow:0 7px 0 #2f7d3a!important; }
  .node.cur{ animation:pulse 1.5s infinite; }
  @keyframes pulse{ 0%,100%{box-shadow:0 7px 0 rgba(0,0,0,.18),0 0 0 0 rgba(255,77,157,.45)} 50%{box-shadow:0 7px 0 rgba(0,0,0,.18),0 0 0 16px rgba(255,77,157,0)} }
  .node .ls{ position:absolute; bottom:-17px; font-size:14px; white-space:nowrap; color:var(--gold-d); letter-spacing:1px; }
  .node .ls i{ color:#d8cdec; font-style:normal; }
  .node .lp{ position:absolute; top:-32px; font-size:28px; }
  .startflag{ position:absolute; top:-34px; left:50%; transform:translateX(-50%); background:var(--card); color:var(--magenta);
    font-family:var(--fhead); font-weight:700; font-size:13px; padding:4px 12px; border-radius:20px; box-shadow:0 3px 0 var(--btnsh);
    animation:bob 1s infinite ease-in-out; white-space:nowrap; }
  .startflag:after{ content:""; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--card); }
  @keyframes bob{ 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }

  /* ---------- GAME ---------- */
  .lvlbar{ display:flex; align-items:center; justify-content:center; gap:8px; padding:2px 16px 6px; flex:none; font-family:var(--fhead); color:var(--muted); }
  .pips{ display:flex; gap:6px; }
  .pip{ width:14px; height:14px; border-radius:50%; background:#e2dcf0; }
  .pip.on{ background:var(--gold); }
  .stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.6vh; padding:1vh 14px 86px; overflow:hidden; min-height:0; }
  .emi-row{ display:flex; align-items:center; gap:14px; max-width:760px; width:100%; justify-content:center; }
  .emi{ width:clamp(66px,14vw,110px); flex:none; position:relative; }
  #emiHome svg, .emi svg, .card .big svg{ filter:drop-shadow(0 5px 5px rgba(120,90,170,.3)); }
  .bubble{ background:var(--card); color:var(--text); border-radius:22px; padding:12px 18px; font-family:var(--fhead);
    font-size:clamp(16px,3.9vw,25px); font-weight:600; position:relative; max-width:70%; box-shadow:0 5px 0 var(--btnsh); }
  .bubble:after{ content:""; position:absolute; left:-12px; top:24px; border:12px solid transparent; border-right-color:var(--card); }
  .prompt-big{ font-family:var(--fhead); font-size:clamp(78px,23vw,170px); font-weight:700; line-height:1; color:var(--violet); }
  .prompt-objs{ font-size:clamp(30px,8vw,64px); line-height:1.1; text-align:center; max-width:92%; }
  .reveal-word{ font-family:var(--fhead); font-weight:700; font-size:clamp(34px,9vw,62px); color:var(--text); letter-spacing:1px; margin-top:6px; }
  .reveal-word .hl{ color:var(--magenta); font-size:1.18em; text-decoration:underline; text-decoration-thickness:5px; text-underline-offset:4px; }
  .options{ display:flex; gap:clamp(10px,2.4vw,20px); flex-wrap:wrap; justify-content:center; align-items:center; width:100%; max-width:820px; }
  .opt{ border:none; cursor:pointer; border-radius:24px; color:#fff; font-family:var(--fhead); font-weight:700;
    background:linear-gradient(160deg,#b06bff,#8338d6); box-shadow:0 9px 0 #5e22a0,0 12px 20px var(--shadow);
    display:flex; align-items:center; justify-content:center; transition:transform .1s, box-shadow .1s, background .2s; min-width:88px; padding:10px; }
  .opt:active{ transform:translateY(7px); box-shadow:0 2px 0 #5e22a0; }
  .opt.letter,.opt.num{ width:clamp(88px,19vw,134px); height:clamp(88px,19vw,134px); font-size:clamp(42px,10vw,76px); }
  .opt.pic{ width:clamp(102px,21vw,154px); height:clamp(102px,21vw,154px); font-size:clamp(50px,12vw,84px); background:var(--card); box-shadow:0 9px 0 var(--btnsh); }
  .opt.group{ width:clamp(112px,23vw,164px); min-height:clamp(102px,21vw,144px); font-size:clamp(26px,6vw,40px); flex-wrap:wrap; gap:4px; padding:14px; line-height:1; background:var(--card); box-shadow:0 9px 0 var(--btnsh); }
  .opt.shape{ width:clamp(102px,21vw,150px); height:clamp(102px,21vw,150px); background:var(--card); box-shadow:0 9px 0 var(--btnsh); }
  .opt.right{ background:linear-gradient(160deg,#6fe07a,#46a852)!important; box-shadow:0 9px 0 #2f7d3a!important; }
  .opt.wrong{ animation:shake .4s; opacity:.45; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
  .shape-svg{ width:62%; height:62%; }
  .emo3d{ width:1em; height:1em; object-fit:contain; vertical-align:-0.14em; }
  .opt.pic .emo3d{ width:84%; height:84%; }
  /* typing / keyboard */
  .type-word{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:6px; }
  .slot{ width:clamp(46px,11vw,68px); height:clamp(56px,13vw,82px); border-radius:14px; background:var(--card);
    box-shadow:0 4px 0 var(--btnsh); display:flex; align-items:center; justify-content:center;
    font-family:var(--fhead); font-weight:700; font-size:clamp(28px,7.5vw,48px); color:var(--violet); border:3px solid transparent; }
  .slot.active{ border-color:var(--magenta); } .slot.miss{ border-color:var(--magenta); }
  .kbd{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:580px; }
  .key{ width:clamp(44px,10.5vw,62px); height:clamp(52px,12vw,70px); border-radius:14px; border:none;
    background:linear-gradient(160deg,#b06bff,#8338d6); color:#fff; font-family:var(--fhead); font-weight:700;
    font-size:clamp(24px,6vw,36px); box-shadow:0 5px 0 #5e22a0; cursor:pointer; }
  .key:active{ transform:translateY(4px); box-shadow:0 1px 0 #5e22a0; }
  .key.wrong{ animation:shake .4s; }
  /* drag: dopasuj / ułóż po kolei */
  .dragwrap{ display:flex; flex-direction:column; align-items:center; gap:2.2vh; width:100%; }
  .zones,.tokens{ display:flex; gap:clamp(10px,2.6vw,20px); justify-content:center; align-items:center; flex-wrap:wrap; }
  .zone{ width:clamp(92px,21vw,138px); height:clamp(92px,21vw,138px); border-radius:22px; background:transparent; border:3px dashed #cdbfe8;
    display:flex; align-items:center; justify-content:center; font-size:clamp(40px,10vw,70px); font-family:var(--fhead); color:var(--violet); position:relative; }
  .zone .slot2{ display:none; }
  .zone.over{ border-color:var(--magenta); border-style:solid; background:rgba(255,77,157,.07); }
  .zone.filled,.zone.right{ border-style:solid; border-color:#6fe07a; background:rgba(111,224,122,.16); }
  .token{ width:clamp(74px,17vw,112px); height:clamp(74px,17vw,112px); border-radius:22px; cursor:grab; touch-action:none; user-select:none;
    background:linear-gradient(160deg,#b06bff,#8338d6); box-shadow:0 7px 0 #5e22a0; color:#fff; font-family:var(--fhead);
    display:flex; align-items:center; justify-content:center; font-size:clamp(38px,9vw,64px); transition:box-shadow .1s; }
  .token.pic{ background:var(--card); box-shadow:0 7px 0 var(--btnsh); }
  .token.dragging{ box-shadow:0 14px 20px rgba(74,58,107,.35); }
  .drag-hint{ font-family:var(--fhead); font-weight:700; color:var(--magenta); font-size:clamp(15px,4vw,22px); text-align:center; }

/* =========================================================
   EMILKA — ŁOWCZYNI WIEDZY  (v0.4 — Duolingo-kids look)
   ========================================================= */
const TOTAL=30, QPL=6;
let UNLOCK_ALL=true; // TESTOWO: wszystkie poziomy odblokowane (ustaw na false, by zablokować progresję)

/* ---------- Persisted state ---------- */
const SAVE='emilka_save_v4';
let state={ stars:0, mode:'zaawansowany', letterCase:'upper', childName:'Emilka', style:'idol', bg:'jasne', pet:'none', hair:'blonde', skin:'jasna', acc:'none', font:'fredoka', voiceName:null,
  progress:{podstawowy:{},zaawansowany:{},trudny:{}}, program:{podstawowy:0,zaawansowany:0,trudny:0}, stats:{}, ach:{}, styleChanged:false };
try{ const s=JSON.parse(localStorage.getItem(SAVE)||'{}'); Object.assign(state,s);
  state.progress=state.progress||{};
  if(!state.progress.zaawansowany&&(state.progress.letters||state.progress.numbers||state.progress.logic)){ const old=state.progress; state.progress={podstawowy:{},zaawansowany:old,trudny:{}}; }
  ['podstawowy','zaawansowany','trudny'].forEach(m=>{ state.progress[m]=state.progress[m]||{}; });
  if(typeof state.program!=='object'||state.program===null)state.program={podstawowy:0,zaawansowany:0,trudny:0};
  ['podstawowy','zaawansowany','trudny'].forEach(m=>{ if(typeof state.program[m]!=='number')state.program[m]=0; });
  if(typeof state.childName!=='string'||!state.childName.trim())state.childName='Emilka'; state.childName=state.childName.slice(0,16);
  state.stats=state.stats||{}; state.ach=state.ach||{}; }catch(e){}
function save(){ try{ localStorage.setItem(SAVE, JSON.stringify(state)); }catch(e){} }

const FONT_ORDER=['fredoka','baloo','poppins','comfortaa'];
const HAIR={
  blonde:{ name:'Blond', need:0, c:['#ffce5a','#efab2e','#ffe49b'] },

function roundLetters(d,forced){
  const tv=['p2l','l2p']; if(d<=8)tv.push('letterlesson'); if(d>=5)tv.push('missing'); if(d>=7)tv.push('matchpic'); if(d>=11)tv.push('spell');
  const variant=forced||pick(tv);
  if(variant==='letterlesson'){ roundLetterLesson(d); return; }
  if(variant==='missing'||variant==='spell'){
    const cap = variant==='spell' ? (d>=16?4:3) : 4;
    const wp=WORDS.filter(w=>w[0].length<=cap), [w,em]=pick(wp.length?wp:WORDS);
    renderType(em,w,variant); return;
  }
  if(variant==='matchpic'){
    const ks=shuffle(Object.keys(LETTERS)).slice(0,3);
    renderDrag(ks.map(k=>({key:k,html:EMO(letPick(k)[1])})), ks.map(k=>({key:k,html:k})),
      'Dopasuj litery do obrazków', 'Przeciągnij każdą literę na obrazek, który się od niej zaczyna.', '👆 przeciągnij literę na obrazek'); return;
  }
  const poolN=clamp(3+Math.ceil(d*0.8),4,LETTERS_ORD.length), pool=LETTERS_ORD.slice(0,poolN), nOpt=d>=10?4:3;
  const target=pick(pool), te=letPick(target), word=te[0], distract=shuffle(pool.filter(k=>k!==target)).slice(0,nOpt-1);
  if(variant==='l2p'){ promptArea().innerHTML=`<div class="prompt-big">${target}</div>`;
    setBubble(`Znajdź obrazek na literę ${target}`); ask(`Litera ${target}. Znajdź obrazek, który zaczyna się na ${target}.`);
    const opts=shuffle([{k:target,c:1,e:te},...distract.map(k=>({k,c:0,e:letPick(k)}))]).map(o=>({html:EMO(o.e[1]),cls:'pic',correct:!!o.c,speak:o.e[0]}));
    renderOptions(opts, ()=>{ revealLetter(te[1],word); say(`${target} jak ${word}!`); });
  }else{ promptArea().innerHTML=`<div class="prompt-objs" style="font-size:clamp(64px,18vw,140px)">${EMO(te[1])}</div>`;
    setBubble('Na jaką literę zaczyna się ten obrazek?'); ask(`${word}. Na jaką literę zaczyna się ${word}?`);
    renderOptions(shuffle([{k:target,c:1},...distract.map(k=>({k,c:0}))]).map(o=>({html:o.k,cls:'letter',correct:!!o.c,speak:o.k})), ()=>{ revealLetter(te[1],word); say(`${word} na literę ${target}!`); });
  }
}
function roundNumbers(d,forced){
  const variants=['count']; if(d>=4)variants.push('group'); if(d>=6)variants.push('matchgrp'); if(d>=8)variants.push('largest');
  if(d>=9)variants.push('order'); if(d>=12)variants.push('add'); if(d>=15)variants.push('sub'); if(d>=20)variants.push('missadd');
  const v=forced||pick(variants), maxN=clamp(3+d,5,9);
  if(v==='matchgrp'){ const e=pick(COUNT_EMOJI); let s=new Set(); while(s.size<3)s.add(1+rnd(6)); const ns=[...s];
    renderDrag(ns.map(n=>({key:n,html:`<span class="emo-grp">${(EMO(e)+' ').repeat(n)}</span>`})), ns.map(n=>({key:n,html:n,cls:'num'})),
      'Dopasuj liczby do obrazków', 'Dopasuj każdą liczbę do obrazka, na którym widać tyle samo elementów.', '👆 przeciągnij liczbę na pasujący obrazek'); return;
  }
  if(v==='order'){ const k=d>=15?4:3; let s=new Set(); while(s.size<k)s.add(1+rnd(9)); const arr=[...s].sort((a,b)=>a-b);
    const sizes=['clamp(72px,17vw,104px)','clamp(84px,19vw,118px)','clamp(96px,21vw,132px)','clamp(108px,23vw,146px)'];
    renderDrag(arr.map((n,i)=>({key:i,size:sizes[i]})), arr.map((n,i)=>({key:i,html:n,cls:'num'})),
      'Ułóż po kolei', 'Ułóż liczby po kolei, od najmniejszej do największej.', '⬅ od najmniejszej do największej ➡'); return;
  }
  if(v==='count'){ const n=1+rnd(maxN), e=pick(COUNT_EMOJI);
    promptArea().innerHTML=`<div class="prompt-objs">${(EMO(e)+' ').repeat(n).trim()}</div>`;
    setBubble('Policz i dotknij liczby!'); ask('Policz, ile tu jest. Dotknij właściwej liczby.');
    let s=new Set([n]); while(s.size<3)s.add(1+rnd(maxN));
    renderOptions(shuffle([...s]).map(x=>({html:x,cls:'num',correct:x===n,speak:nw(x)})), ()=>say(`Tak! ${nw(n)}`));
  }else if(v==='group'){ const n=1+rnd(clamp(maxN,5,7)), e=pick(COUNT_EMOJI);
    promptArea().innerHTML=`<div class="prompt-big">${n}</div>`;
    setBubble(`Gdzie jest ${n}?`); ask(`Policz elementy i dotknij obrazka, na którym jest ${nw(n)}.`);
    let s=new Set([n]); while(s.size<3)s.add(1+rnd(clamp(maxN,5,7)));
    renderOptions(shuffle([...s]).map(c=>({html:(EMO(e)+' ').repeat(c).trim(),cls:'group',correct:c===n,speak:nw(c)})), ()=>say(`Brawo! ${nw(n)}`));
  }else if(v==='largest'){ let s=new Set(); while(s.size<3)s.add(1+rnd(9)); const arr=[...s], mx=Math.max(...arr);
    promptArea().innerHTML=`<div class="prompt-objs" style="font-size:clamp(22px,5.5vw,34px);color:var(--magenta)">Która liczba jest największa?</div>`;
    setBubble('Dotknij największej!'); ask('Która liczba jest największa? Dotknij jej.');
    renderOptions(shuffle(arr).map(x=>({html:x,cls:'num',correct:x===mx,speak:nw(x)})), ()=>say(`Tak! ${nw(mx)} jest największa.`));
  }else if(v==='add'){ const cap=d>=20?9:5, a=1+rnd(cap), b=1+rnd(cap), sum=a+b;
    promptArea().innerHTML=`<div class="prompt-big" style="font-size:clamp(54px,15vw,110px)">${a} + ${b}</div>`;
    setBubble('Ile to razem?'); ask(`Ile to jest ${nw(a)} plus ${nw(b)}?`);
    let s=new Set([sum]); while(s.size<3)s.add(clamp(sum+(rnd(5)-2),1,18));
    renderOptions(shuffle([...s]).map(x=>({html:x,cls:'num',correct:x===sum,speak:nw(x)})), ()=>say(`Tak! To ${nw(sum)}`));
  }else if(v==='sub'){ const a=2+rnd(8), b=1+rnd(a-1), res=a-b;
    promptArea().innerHTML=`<div class="prompt-big" style="font-size:clamp(54px,15vw,110px)">${a} − ${b}</div>`;
    setBubble('Ile zostanie?'); ask(`Ile to jest ${nw(a)} minus ${nw(b)}?`);
    let s=new Set([res]); while(s.size<3)s.add(clamp(res+(rnd(5)-2),0,9));
    renderOptions(shuffle([...s]).map(x=>({html:x,cls:'num',correct:x===res,speak:nw(x)})), ()=>say(`Tak! Zostanie ${nw(res)}`));
  }else{ const a=1+rnd(5), b=1+rnd(5), sum=a+b;
    promptArea().innerHTML=`<div class="prompt-big" style="font-size:clamp(46px,13vw,96px)">${a} + ❓ = ${sum}</div>`;
    setBubble('Ile brakuje?'); ask(`${nw(a)} plus ile równa się ${nw(sum)}?`);
    let s=new Set([b]); while(s.size<3)s.add(clamp(b+(rnd(5)-2),1,9));
    renderOptions(shuffle([...s]).map(x=>({html:x,cls:'num',correct:x===b,speak:nw(x)})), ()=>say(`Tak! Brakuje ${nw(b)}`));
  }
}
function roundLogic(d,forced){
  const variants=['oddcolor','same','bigsmall']; if(d>=3)variants.push('oddshape','pairs'); if(d>=5)variants.push('pattern'); if(d>=6)variants.push('orderobj'); if(d>=8)variants.push('oddcat'); if(d>=10)variants.push('ordersize');
  const v=forced||pick(variants), nOpt=d>=6?4:3;
  if(v==='orderobj'){ const set=pick(ORDER_SETS), zs=['clamp(72px,17vw,104px)','clamp(90px,20vw,124px)','clamp(108px,23vw,146px)'];
    renderDrag(set.map((e,i)=>({key:i,size:zs[i]})), set.map((e,i)=>({key:i,html:EMO(e),cls:'pic'})),
      'Ułóż od najmniejszego', 'Ułóż obrazki od najmniejszego do największego.', '⬅ od najmniejszego do największego ➡'); return;
  }
  if(v==='ordersize'){ const sh=pick(SHAPES), col=pick(COLORS)[1], pcts=[44,64,86], zs=['clamp(72px,17vw,104px)','clamp(90px,20vw,124px)','clamp(108px,23vw,146px)'];
    renderDrag(pcts.map((p,i)=>({key:i,size:zs[i]})), pcts.map((p,i)=>({key:i,html:sizedShape(sh,col,p),cls:'pic'})),
      'Ułóż od najmniejszego', 'Ułóż kształty od najmniejszego do największego.', '⬅ od najmniejszego do największego ➡'); return;
  }
  if(v==='oddcolor'){ const cols=shuffle(COLORS), base=cols[0], odd=cols[1], sh=pick(SHAPES);
    setBubble('Który jest inny?'); ask('Który jest inny? Dotknij tego, który nie pasuje do reszty.'); promptArea().innerHTML='';
    const arr=[{c:odd,k:1}]; for(let i=0;i<nOpt-1;i++)arr.push({c:base,k:0});
    renderOptions(shuffle(arr).map(o=>({html:shapeSVG(sh,o.c[1]),cls:'shape',correct:!!o.k,speak:o.c[0]})), ()=>say('Tak! Ten miał inny kolor.'));
  }else if(v==='oddshape'){ const col=pick(COLORS)[1], sh=shuffle(SHAPES);
    setBubble('Który kształt jest inny?'); ask('Który kształt jest inny niż pozostałe?'); promptArea().innerHTML='';
    const arr=[{s:sh[1],k:1}]; for(let i=0;i<nOpt-1;i++)arr.push({s:sh[0],k:0});
    renderOptions(shuffle(arr).map(o=>({html:shapeSVG(o.s,col),cls:'shape',correct:!!o.k})), ()=>say('Świetnie! Ten kształt był inny.'));
  }else if(v==='same'){ const cols=shuffle(COLORS), sh=shuffle(SHAPES), tc=cols[0], ts=sh[0];
    promptArea().innerHTML=`<div style="width:clamp(64px,17vw,108px);margin:0 auto">${shapeSVG(ts,tc[1])}</div>`;
    setBubble('Znajdź taki sam!'); ask('Popatrz na kształt na górze i znajdź dokładnie taki sam.');
    const opts=[{s:ts,c:tc,k:1},{s:ts,c:cols[1],k:0},{s:sh[1],c:tc,k:0}]; if(nOpt>3)opts.push({s:sh[1],c:cols[1],k:0});
    renderOptions(shuffle(opts).map(o=>({html:shapeSVG(o.s,o.c[1]),cls:'shape',correct:!!o.k})), ()=>say('Tak! Taki sam.'));
  }else if(v==='bigsmall'){ const sh=pick(SHAPES), col=pick(COLORS)[1], sizes=[42,64,92], big=rnd(2)===0, target=big?92:42;
    setBubble(big?'Który jest największy?':'Który jest najmniejszy?'); ask(big?'Dotknij największego kształtu.':'Dotknij najmniejszego kształtu.'); promptArea().innerHTML='';
    renderOptions(shuffle(sizes).map(sz=>({html:sizedShape(sh,col,sz),cls:'shape',correct:sz===target})), ()=>say(big?'Tak! Ten był największy.':'Tak! Ten był najmniejszy.'));
  }else if(v==='pairs'){ const p=pick(PAIRS), others=shuffle(PAIRS.filter(x=>x!==p)).slice(0,nOpt-1).map(x=>x[rnd(2)]);
    promptArea().innerHTML=`<div class="prompt-objs" style="font-size:clamp(60px,16vw,118px)">${EMO(p[0])}</div>`;

    renderOptions(shuffle([{e:p[1],k:1},...others.map(e=>({e,k:0}))]).map(o=>({html:EMO(o.e),cls:'pic',correct:!!o.k})), ()=>say('Tak! To do siebie pasuje.'));
  }else if(v==='pattern'){ const ncol=d>=10?3:2, cols=shuffle(COLORS).slice(0,ncol), sh=pick(SHAPES), len=(ncol===3?6:4);

    renderOptions(shuffle(opts).map(o=>({html:shapeSVG(sh,o.c[1]),cls:'shape',correct:!!o.k,speak:o.c[0]})), ()=>say('Brawo! Zgadłaś wzór.'));
  }else{ const ck=shuffle(CAT_KEYS), main=ck[0], oddC=ck[1], mains=shuffle(CATEGORIES[main]).slice(0,nOpt-1), odd=pick(CATEGORIES[oddC]);

  }

  {c:'zwierzęta',q:'Żółw chowa się do swojej skorupy.',t:true,d:1,e:'Tak! Twarda skorupa chroni żółwia jak tarcza, gdy czuje zagrożenie.'},
  {c:'zwierzęta',q:'Ryba potrafi chodzić po lądzie jak piesek.',t:false,d:1,e:'Nie. Ryba pływa w wodzie, a na lądzie nie potrafi chodzić.'},
  {c:'zwierzęta',q:'Ryba ma futro jak miś.',t:false,d:1,e:'Nie. Ryba jest pokryta śliskimi łuskami, a nie futrem.'},
  {c:'zwierzęta',q:'Nietoperz to ptak.',t:false,d:2,e:'Nie. Nietoperz lata, ale to ssak — nie ma piór, a jego dzieci piją mleko mamy.'},
  {c:'zwierzęta',q:'Delfin oddycha pod wodą jak ryba.',t:false,d:2,e:'Nie. Delfin to ssak i oddycha powietrzem, dlatego co chwilę wypływa na powierzchnię, żeby zaczerpnąć powietrza.'},
  {c:'zwierzęta',q:'Pająk ma osiem nóg.',t:true,d:2,e:'Tak! Pająk ma osiem nóg. Dlatego nie jest owadem — owady mają tylko sześć nóg.'},
  {c:'zwierzęta',q:'Motyl najpierw jest gąsienicą.',t:true,d:2,e:'Tak! Z jajeczka wykluwa się gąsienica, potem zamyka się w kokonie, a na końcu wyfruwa kolorowy motyl.'},
  {c:'zwierzęta',q:'Żaba na początku życia jest kijanką.',t:true,d:2,e:'Tak! Mała kijanka mieszka w wodzie i ma ogonek, a z czasem wyrastają jej nóżki i staje się żabą.'},
  {c:'zwierzęta',q:'Pingwin potrafi latać w powietrzu.',t:false,d:2,e:'Nie. Pingwin używa skrzydeł do pływania w wodzie, a nie do latania.'},
  {c:'zwierzęta',q:'Sowa poluje głównie w nocy.',t:true,d:2,e:'Tak! Sowa ma wielkie oczy i świetny słuch, więc poluje w ciemności, gdy inne ptaki śpią.'},
  {c:'zwierzęta',q:'Sowa potrafi obrócić głowę bardzo daleko, prawie za siebie.',t:true,d:2,e:'Tak! Dzięki temu rozgląda się dookoła, nie ruszając resztą ciała.'},
  {c:'zwierzęta',q:'Niedźwiedź zimą zapada w sen zimowy.',t:true,d:2,e:'Tak! Zimą jest mało jedzenia, więc niedźwiedź zasypia w gawrze i śpi prawie do wiosny.'},
  {c:'zwierzęta',q:'Wielbłąd gromadzi zapas w garbie.',t:true,d:2,e:'Tak! W garbie trzyma zapas tłuszczu i korzysta z niego, gdy na pustyni brakuje jedzenia i wody.'},
  {c:'zwierzęta',q:'Ryby oddychają skrzelami.',t:true,d:2,e:'Tak! Ryby nie mają płuc jak my. Skrzela po bokach głowy pozwalają im oddychać pod wodą.'},
  {c:'zwierzęta',q:'Krokodyl żywi się trawą.',t:false,d:2,e:'Nie. Krokodyl to drapieżnik z ostrymi zębami — poluje na inne zwierzęta, a nie skubie trawy.'},
  {c:'zwierzęta',q:'Wieloryb jest większy od słonia.',t:true,d:2,e:'Tak! Wieloryb to największe zwierzę na Ziemi — jest nawet większy niż słoń i mieszka w oceanie.'},
  {c:'zwierzęta',q:'Jeż ma kolce, którymi się broni.',t:true,d:2,e:'Tak! Gdy jeż się boi, zwija się w kulkę najeżoną kolcami, więc nikt nie chce go zaczepiać.'},
  {c:'zwierzęta',q:'Słoń pije i chwyta jedzenie trąbą.',t:true,d:2,e:'Tak! Trąba działa dla słonia jak ręka i jak słomka do picia naraz.'},
  {c:'zwierzęta',q:'Kot ma wąsy, które pomagają mu wyczuwać otoczenie.',t:true,d:2,e:'Tak! Wąsami kot sprawdza, czy zmieści się w wąskie miejsce, nawet po ciemku.'},
  {c:'zwierzęta',q:'Mrówka potrafi unieść coś cięższego od siebie.',t:true,d:2,e:'Tak! Maleńka mrówka jest bardzo silna jak na swój rozmiar.'},
  {c:'zwierzęta',q:'Paw rozkłada kolorowy ogon jak wachlarz.',t:true,d:2,e:'Tak! Paw stroszy ogon w wielki, mieniący się kolorami wachlarz.'},
  {c:'zwierzęta',q:'Kangur nosi swoje dziecko w kieszonce na brzuchu.',t:true,d:2,e:'Tak! Mały kangurek chowa się i podróżuje w torbie mamy.'},
  {c:'zwierzęta',q:'Kameleon potrafi zmieniać kolor skóry.',t:true,d:2,e:'Tak! Zmienia barwę, żeby się ukryć albo pokazać, jak się czuje.'},
  {c:'zwierzęta',q:'Nietoperz w ciemności orientuje się dzięki dźwiękom.',t:true,d:2,e:'Tak! Wysyła dźwięki, które się odbijają, i tak wie, gdzie lecieć i co jest obok.'},
  {c:'zwierzęta',q:'Żółw biega szybciej niż gepard.',t:false,d:2,e:'Nie. Żółw jest powolny, a gepard to najszybsze zwierzę na lądzie.'},
  {c:'zwierzęta',q:'Sroka lubi błyszczące przedmioty.',t:true,d:2,e:'Tak! Srokę przyciągają błyszczące rzeczy, które czasem zabiera do gniazda.'},

  {c:'natura',q:'Woda w morzu jest słona.',t:true,d:1,e:'Tak! W morskiej wodzie jest dużo soli, dlatego jest słona i nie nadaje się do picia.'},
  {c:'natura',q:'Ogień jest zimny i można go dotknąć.',t:false,d:1,e:'Nie! Ogień jest bardzo gorący i parzy. Nigdy nie wolno go dotykać.'},
  {c:'natura',q:'Kwiatek bez wody zwiędnie.',t:true,d:1,e:'Tak! Kwiaty piją wodę. Bez niej opadają i więdną, dlatego trzeba je podlewać.'},
  {c:'natura',q:'Ziarnko piasku jest większe od dużego kamienia.',t:false,d:1,e:'Nie. Ziarnko piasku jest malusieńkie, a kamień znacznie większy.'},
  {c:'natura',q:'Woda zamarza i zmienia się w lód, gdy jest mróz.',t:true,d:2,e:'Tak! Gdy robi się bardzo zimno, woda twardnieje w lód. W cieple lód znów topnieje w wodę.'},
  {c:'natura',q:'Lód pływa po wodzie i nie tonie.',t:true,d:2,e:'Tak! Lód jest lżejszy od wody, dlatego unosi się na powierzchni — jak kostki lodu w szklance.'},
  {c:'natura',q:'Rośliny potrzebują światła, żeby rosnąć.',t:true,d:2,e:'Tak! Roślinki czerpią siłę ze światła słońca i z wody, dlatego obracają się w stronę słońca.'},
  {c:'natura',q:'Drzewo iglaste, jak sosna, ma igły zamiast liści.',t:true,d:2,e:'Tak! Sosna i świerk mają cienkie igły i pozostają zielone nawet zimą.'},
  {c:'natura',q:'Jesienią liście zmieniają kolor i opadają.',t:true,d:2,e:'Tak! Jesienią liście robią się żółte i czerwone, a potem spadają. Wiosną wyrosną nowe.'},
  {c:'natura',q:'Z żołędzia może wyrosnąć dąb.',t:true,d:2,e:'Tak! Mały żołądź to nasionko, z którego z czasem wyrasta wielkie drzewo — dąb.'},
  {c:'natura',q:'Rzeka płynie pod górę, w stronę źródła.',t:false,d:2,e:'Nie. Woda zawsze spływa w dół, dlatego rzeka płynie z gór aż do morza.'},
  {c:'natura',q:'Drzewa pomagają nam oddychać, dając tlen.',t:true,d:2,e:'Tak! Liście drzew oczyszczają powietrze i wytwarzają tlen, którym oddychamy.'},
  {c:'natura',q:'Grzyby lubią rosnąć w lesie po deszczu.',t:true,d:2,e:'Tak! Grzyby lubią wilgoć i cień, dlatego po deszczu pojawia się ich w lesie więcej.'},
  {c:'natura',q:'Wulkan to góra, z której może buchać gorąca lawa.',t:true,d:2,e:'Tak! Lawa to roztopiona, bardzo gorąca skała, która wydobywa się ze środka Ziemi.'},
  {c:'natura',q:'Na pustyni jest dużo piasku i mało wody.',t:true,d:2,e:'Tak! Na pustyni prawie nie pada deszcz, dlatego jest tam sucho i gorąco.'},
  {c:'pogoda',q:'Po deszczu i słońcu czasem pojawia się tęcza.',t:true,d:2,e:'Tak! Gdy słońce świeci przez kropelki deszczu, rozkłada się na kolory i powstaje tęcza.'},
  {c:'pogoda',q:'Podczas burzy po błyskawicy słychać grzmot.',t:true,d:2,e:'Tak! Błysk widać od razu, a grzmot słychać chwilę później, bo dźwięk leci wolniej niż światło.'},
  {c:'pogoda',q:'Śnieg pada, gdy jest bardzo ciepło.',t:false,d:1,e:'Nie! Wysoko w chmurach jest tak zimno, że kropelki wody zamarzają w maleńkie kryształki i spadają jako śnieg. Dlatego śnieg pada zimą.'},
  {c:'pogoda',q:'Wiatr to powietrze, które się porusza.',t:true,d:2,e:'Tak! Wiatru nie widać, ale czujemy go na twarzy i widzimy, jak kołysze drzewa.'},
  {c:'pogoda',q:'Mgła to chmura tuż przy ziemi.',t:true,d:2,e:'Tak! We mgle wszystko robi się białe i trudno coś dojrzeć z daleka.'},
  {c:'pogoda',q:'Chmury są zrobione z malutkich kropelek wody.',t:true,d:2,e:'Tak! Gdy zbierze się ich bardzo dużo, z chmury spada deszcz.'},
  {c:'pogoda',q:'Słońce świeci mocniej w nocy niż w dzień.',t:false,d:1,e:'Nie. W nocy słońca w ogóle nie widać — świeci za dnia.'},
  {c:'kolory',q:'Mieszając niebieski i żółty, otrzymasz zielony.',t:true,d:2,e:'Tak! Niebieska i żółta farba razem dają zielony — jak kolor trawy.'},
  {c:'kolory',q:'Mieszając czerwony i żółty, otrzymasz pomarańczowy.',t:true,d:2,e:'Tak! Tak właśnie powstaje kolor pomarańczy i marchewki.'},
  {c:'kolory',q:'Tęcza jest tylko czarno-biała.',t:false,d:1,e:'Nie. Tęcza ma wiele kolorów: czerwony, pomarańczowy, żółty, zielony, niebieski i fioletowy.'},
  {c:'kolory',q:'Czerwony i pomarańczowy to kolory ciepłe.',t:true,d:2,e:'Tak! Kojarzą się z ogniem i słońcem, dlatego mówimy o nich, że są ciepłe.'},
  {c:'kolory',q:'Niebieski i zielony to kolory chłodne.',t:true,d:2,e:'Tak! Kojarzą się z wodą i trawą, dlatego nazywamy je chłodnymi.'},
  {c:'kolory',q:'Cytryna jest fioletowa.',t:false,d:1,e:'Nie. Cytryna jest żółta, a fioletowa bywa np. śliwka.'},
  {c:'kolory',q:'Niebo w pogodny dzień jest niebieskie.',t:true,d:1,e:'Tak! W słoneczny dzień niebo nad nami jest niebieskie.'},
  {c:'kolory',q:'Węgiel jest biały jak śnieg.',t:false,d:1,e:'Nie. Węgiel jest czarny.'},

  {c:'kosmos',q:'Słońce to gwiazda.',t:true,d:1,e:'Tak! Słońce to ogromna, gorąca gwiazda. Wydaje się większe niż inne, bo jest najbliżej nas.'},
  {c:'kosmos',q:'Gwiazdy widać najlepiej w nocy.',t:true,d:1,e:'Tak! W dzień jasne słońce zasłania gwiazdy. Dopiero w ciemną noc widać, jak dużo ich świeci.'},
  {c:'kosmos',q:'Ziemia jest płaska jak naleśnik.',t:false,d:1,e:'Nie. Ziemia jest okrągła jak wielka piłka. Z kosmosu widać niebiesko-zieloną kulę.'},
  {c:'kosmos',q:'Słońce jest zimne jak lód.',t:false,d:1,e:'Nie. Słońce jest bardzo, bardzo gorące — dlatego daje nam ciepło aż tutaj.'},
  {c:'kosmos',q:'Planeta, na której mieszkamy, to Ziemia.',t:true,d:1,e:'Tak! Nasz dom w kosmosie to planeta Ziemia.'},
  {c:'kosmos',q:'Ziemia krąży wokół Słońca.',t:true,d:2,e:'Tak! Ziemia bez przerwy okrąża Słońce. Jedno pełne okrążenie trwa cały rok.'},
  {c:'kosmos',q:'Księżyc świeci własnym światłem.',t:false,d:2,e:'Nie. Księżyc sam nie świeci — odbija światło Słońca, tak jak lusterko odbija światło lampy.'},
  {c:'kosmos',q:'Słońce jest dużo większe od Ziemi.',t:true,d:2,e:'Tak! Słońce jest ogromne — zmieściłoby się w nim mnóstwo takich planet jak nasza Ziemia.'},
  {c:'kosmos',q:'W kosmosie astronauta nosi skafander.',t:true,d:2,e:'Tak! W kosmosie nie ma powietrza, więc skafander daje astronaucie czym oddychać i chroni go.'},
  {c:'kosmos',q:'Na Księżycu byli już ludzie.',t:true,d:2,e:'Tak! Astronauci polecieli rakietą i chodzili po Księżycu, zostawiając ślady stóp.'},
  {c:'kosmos',q:'W kosmosie jest cicho, bo nie ma powietrza.',t:true,d:2,e:'Tak! Dźwięk potrzebuje powietrza, żeby się rozchodzić, a w kosmosie go nie ma.'},
  {c:'kosmos',q:'Księżyc zmienia kształt na niebie.',t:true,d:2,e:'Tak! Raz jest okrągły, a innym razem wygląda jak cienki rogalik.'},
  {c:'kosmos',q:'W kosmosie astronauci unoszą się i pływają w powietrzu.',t:true,d:2,e:'Tak! Nie ma tam ciężkości, więc astronauci i przedmioty lewitują.'},
  {c:'kosmos',q:'Spadająca gwiazda to tak naprawdę okruch z kosmosu.',t:true,d:2,e:'Tak! To maleńki kamyk, który świeci, gdy z dużą prędkością wpada w powietrze Ziemi.'},
  {c:'kosmos',q:'Gwiazdy na niebie układają się w gwiazdozbiory.',t:true,d:2,e:'Tak! Ludzie łączą gwiazdy w obrazki, na przykład w Wielki Wóz.'},
  {c:'pojazdy',q:'Statek pływa po wodzie.',t:true,d:1,e:'Tak! Statki i łódki pływają po wodzie i przewożą ludzi oraz różne rzeczy.'},
  {c:'pojazdy',q:'Pociąg jeździ po szynach.',t:true,d:1,e:'Tak! Pociąg jedzie po metalowych szynach i potrafi ciągnąć wiele wagonów naraz.'},
  {c:'pojazdy',q:'Samolot jeździ po torach jak pociąg.',t:false,d:1,e:'Nie. Samolot ma skrzydła i lata wysoko w powietrzu. Po torach jeździ pociąg.'},
  {c:'pojazdy',q:'Rower napędzamy nogami, pedałując.',t:true,d:1,e:'Tak! Kręcimy pedałami, koła się obracają i rower jedzie.'},
  {c:'pojazdy',q:'Strażacy jeżdżą czerwonym wozem strażackim.',t:true,d:1,e:'Tak! Wóz wiezie wodę, węże i drabinę do gaszenia ognia.'},
  {c:'pojazdy',q:'Autobus może przewozić wielu ludzi naraz.',t:true,d:1,e:'Tak! Dlatego ma w środku dużo miejsc do siedzenia.'},
  {c:'pojazdy',q:'Pociąg jest szybszy od ślimaka.',t:true,d:1,e:'Tak! Pociąg pędzi bardzo szybko, a ślimak sunie wolniutko.'},
  {c:'pojazdy',q:'Rakieta jeździ po drodze do sklepu.',t:false,d:1,e:'Nie. Rakieta leci w kosmos, a po drodze do sklepu jedzie samochód.'},
  {c:'pojazdy',q:'Helikopter ma wirnik, czyli śmigło na górze.',t:true,d:2,e:'Tak! Kręcące się śmigło unosi helikopter do góry i pozwala mu zawisnąć w miejscu.'},
  {c:'pojazdy',q:'Łódź podwodna potrafi pływać pod wodą.',t:true,d:2,e:'Tak! Łódź podwodna umie zanurzyć się głęboko i płynąć pod powierzchnią wody.'},
  {c:'pojazdy',q:'Karetka jedzie na sygnale do chorych.',t:true,d:2,e:'Tak! Ma głośny sygnał i światła, żeby szybko dojechać i zawieźć chorego do szpitala.'},
  {c:'pojazdy',q:'Balon na ogrzane powietrze unosi się w górę.',t:true,d:2,e:'Tak! Ciepłe powietrze jest lekkie i podnosi wielki balon razem z koszem.'},
  {c:'pojazdy',q:'Traktor pomaga w pracy na polu.',t:true,d:2,e:'Tak! Ciągnie maszyny, które orzą ziemię i zbierają plony.'},
  {c:'pojazdy',q:'Żaglówka płynie dzięki wiatrowi w żaglu.',t:true,d:2,e:'Tak! Wiatr napiera na żagiel i popycha łódkę po wodzie.'},
  {c:'pojazdy',q:'Koparka kopie w ziemi wielką łyżką.',t:true,d:2,e:'Tak! Jej długie ramię z łyżką nabiera ziemię i odkłada na bok.'},

  {c:'ciało',q:'Językiem czujemy smak.',t:true,d:1,e:'Tak! Na języku mamy maleńkie kubki smakowe, które rozpoznają, czy coś jest słodkie, kwaśne czy słone.'},
  {c:'ciało',q:'Oczami słyszymy dźwięki.',t:false,d:1,e:'Nie. Oczami patrzymy i widzimy, a dźwięki słyszymy uszami.'},
  {c:'ciało',q:'Nosem czujemy zapachy.',t:true,d:1,e:'Tak! Nosem wąchamy na przykład kwiaty, obiad albo pachnące mydło.'},
  {c:'ciało',q:'Mamy pięć palców u jednej ręki.',t:true,d:1,e:'Tak! Policz razem ze mną: jeden, dwa, trzy, cztery, pięć.'},
  {c:'ciało',q:'Człowiek ma skrzydła i potrafi latać.',t:false,d:1,e:'Nie. Ludzie nie mają skrzydeł i nie potrafią latać o własnych siłach.'},
  {c:'ciało',q:'Serce pompuje krew po całym ciele.',t:true,d:2,e:'Tak! Serce bije bez przerwy i jak pompka rozprowadza krew po ciele. Jego stukanie czujesz w piersi.'},
  {c:'ciało',q:'Krew w naszym ciele jest niebieska.',t:false,d:2,e:'Nie. Krew jest czerwona. Żyłki pod skórą bywają niebieskawe, ale sama krew w środku jest czerwona.'},
  {c:'ciało',q:'Kości tworzą szkielet, który podtrzymuje ciało.',t:true,d:2,e:'Tak! Twarde kości łączą się w szkielet, który trzyma nasze ciało i chroni to, co jest w środku.'},
  {c:'ciało',q:'Mleczne zęby wypadają, a w ich miejsce rosną nowe.',t:true,d:2,e:'Tak! Najpierw mamy mleczne ząbki. Gdy wypadną, wyrastają większe zęby stałe — już na całe życie.'},
  {c:'ciało',q:'Płuca pomagają nam oddychać.',t:true,d:2,e:'Tak! Gdy robimy wdech, płuca napełniają się powietrzem, a przy wydechu je wypuszczają.'},
  {c:'ciało',q:'Gdy biegniemy, serce bije szybciej.',t:true,d:2,e:'Tak! Serce pracuje wtedy mocniej, żeby dać mięśniom więcej siły.'},
  {c:'ciało',q:'Skóra okrywa i chroni całe nasze ciało.',t:true,d:2,e:'Tak! Skóra jest jak miękki płaszcz, który osłania nas dookoła.'},
  {c:'dom',q:'Zęby myjemy szczoteczką i pastą.',t:true,d:1,e:'Tak! Myjemy je rano i wieczorem, żeby były czyste, mocne i zdrowe.'},
  {c:'dom',q:'W łóżku śpimy i odpoczywamy.',t:true,d:1,e:'Tak! Podczas snu nabieramy siły na cały następny dzień.'},
  {c:'dom',q:'Lampa daje światło, gdy jest ciemno.',t:true,d:1,e:'Tak! Wystarczy ją włączyć, żeby zrobiło się jasno.'},
  {c:'dom',q:'Buty zakładamy na ręce.',t:false,d:1,e:'Nie. Buty zakładamy na nogi, a na ręce rękawiczki.'},
  {c:'dom',q:'Parasol chroni nas przed deszczem.',t:true,d:1,e:'Tak! Pod otwartym parasolem nie zmokniemy.'},
  {c:'dom',q:'Lodówka chłodzi jedzenie, by dłużej było świeże.',t:true,d:2,e:'Tak! W zimnej lodówce jedzenie wolniej się psuje, dlatego trzymamy w niej np. mleko i jogurt.'},
  {c:'dom',q:'Klucz pasuje do zamka i otwiera drzwi.',t:true,d:2,e:'Tak! Tylko właściwy klucz otworzy zamek — trochę jak puzzel pasujący do jednego miejsca.'},
  {c:'dom',q:'Mydłem myjemy ręce, żeby pozbyć się zarazków.',t:true,d:2,e:'Tak! Dlatego myjemy ręce przed jedzeniem i po powrocie do domu.'},
  {c:'jedzenie',q:'Chleb piecze się z mąki.',t:true,d:1,e:'Tak! Chleb robi się z mąki, wody i drożdży, a potem piecze w gorącym piekarniku.'},
  {c:'jedzenie',q:'Cytryna jest słodka jak cukierek.',t:false,d:1,e:'Nie. Cytryna jest bardzo kwaśna — gdy ją spróbujesz, aż zaciśniesz oczy!'},
  {c:'jedzenie',q:'Owoce i warzywa są zdrowe.',t:true,d:1,e:'Tak! Mają witaminy, które dają nam siłę i pomagają być zdrowym.'},
  {c:'jedzenie',q:'Jajko znosi kura.',t:true,d:1,e:'Tak! Z kurzych jajek robimy na przykład jajecznicę.'},

    const dn=finished?strokes.length:si; for(let s=0;s<dn;s++)spath(strokes[s],strokes[s].length-1);
    if(!finished)spath(strokes[si],pi);
    if(!finished){ const h=head();
      if(pi===0){ ctx.fillStyle='#ff4d9d'; ctx.beginPath(); ctx.arc(h[0],h[1],size*0.06,0,7); ctx.fill(); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='700 '+(size*0.05)+'px Fredoka,sans-serif'; ctx.fillText('▶',h[0],h[1]); }

  draw();
  const pt=e=>{ const r=cv.getBoundingClientRect(); return [(e.clientX-r.left)*size/r.width,(e.clientY-r.top)*size/r.height]; };
  cv.style.touchAction='none';
  cv.addEventListener('pointerdown',e=>{ if(finished)return; const p=pt(e),h=head(); if(Math.hypot(p[0]-h[0],p[1]-h[1])<tol*1.6){ dragging=true; try{cv.setPointerCapture(e.pointerId);}catch(_){}; } e.preventDefault(); });

    while(pi<st.length-1 && Math.hypot(p[0]-st[pi+1][0],p[1]-st[pi+1][1])<tol && adv<80){ pi++; adv++; }

  cv.addEventListener('pointerup',()=>{ dragging=false; });
  function done(){ emiHappy(); say('Brawo! To litera '+letter); confetti(); setTimeout(()=>onComplete&&onComplete(),1200); }
  const skip=document.createElement('button'); skip.className='opt tf-next'; skip.textContent='Gotowe ▶'; skip.style.cssText='margin-top:12px;display:none'; skip.onclick=()=>{ if(!finished){ finished=true; draw(); done(); } }; el.appendChild(skip);
  setTimeout(()=>{ if(!finished)skip.style.display=''; },12000);
}

function zoneAt(x,y,zr){ let f=null; zr.querySelectorAll('.zone').forEach(z=>{ const r=z.getBoundingClientRect(); if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)f=z; }); return f; }
function attachDrag(el, zr, wrap){
  let active=false,w=0,h=0;
  const home=()=>{ el.style.position='';el.style.left='';el.style.top='';el.style.width='';el.style.height='';el.style.zIndex=''; };
  el.addEventListener('pointerdown',e=>{ if(locked||el.classList.contains('placed'))return; active=true; const dm=wrap.querySelector('.drag-demo'); if(dm)dm.remove(); try{el.setPointerCapture(e.pointerId);}catch(_){}
    el.classList.add('dragging'); const r=el.getBoundingClientRect(); w=r.width;h=r.height;
    el.style.width=w+'px';el.style.height=h+'px';el.style.position='fixed';el.style.zIndex=200;
    el.style.left=(e.clientX-w/2)+'px';el.style.top=(e.clientY-h/2)+'px'; e.preventDefault(); });
  el.addEventListener('pointermove',e=>{ if(!active)return; el.style.left=(e.clientX-w/2)+'px';el.style.top=(e.clientY-h/2)+'px';
    zr.querySelectorAll('.zone').forEach(z=>z.classList.remove('over')); const z=zoneAt(e.clientX,e.clientY,zr); if(z&&!z.classList.contains('filled'))z.classList.add('over'); });

}

        state.bg===k, ()=>{ if(state.stars<it.need){ toast('Zbierz ⭐ '+it.need); say('Potrzebujesz '+it.need+' gwiazdek'); return; } state.bg=k; save(); applyLook(); renderWardrobe(); }); });
  }else if(wdTab==='pet'){ PET_ORDER.forEach(k=>{ const it=PETS[k], lk=state.stars<it.need;
      add(`<div class="big">${it.emoji?EMO(it.emoji):'🚫'}</div><div class="lbl">${it.name}</div>${lk?lockHtml(it.need):''}`,
        state.pet===k, ()=>{ if(state.stars<it.need){ toast('Zbierz ⭐ '+it.need); say('Potrzebujesz '+it.need+' gwiazdek'); return; } state.pet=k; save(); applyLook(); renderWardrobe(); checkAch(); if(it.emoji)say(it.name); }); });
  }
}
/* ---------- Ustawienia ---------- */
function renderSettings(){ const body=$('setBody'); body.innerHTML='';
  const sec=t=>{ const d=document.createElement('div'); d.className='set-sec'; d.textContent=t; body.appendChild(d); };
  const grid=()=>{ const g=document.createElement('div'); g.className='wrap-grid'; g.style.cssText='padding:4px 0 6px'; body.appendChild(g); return g; };
  const card=(g,html,sel,fn)=>{ const c=document.createElement('div'); c.className='card'+(sel?' sel':''); c.innerHTML=html; c.onclick=fn; g.appendChild(c); };
  let g;
  sec('👶 Imię dziecka');
  const nameWrap=document.createElement('div'); nameWrap.style.cssText='padding:4px 0 6px';
  const inp=document.createElement('input'); inp.type='text'; inp.maxLength=16; inp.value=state.childName||'';
  inp.placeholder='Wpisz imię'; inp.className='name-input';
  inp.oninput=()=>{ state.childName=inp.value.slice(0,16); applyName(); };
  inp.onchange=()=>{ state.childName=(inp.value.trim()||'Emilka').slice(0,16); inp.value=state.childName; applyName(); save(); say('Cześć '+state.childName+'!'); };
  nameWrap.appendChild(inp); body.appendChild(nameWrap);
  sec('🔊 Dźwięk'); g=grid();
  card(g,`<div class="big">🔊</div><div class="lbl">Włączony</div>`, !muted, ()=>{ muted=false; unlockAudio(); say('Dźwięk włączony'); renderSettings(); });
  card(g,`<div class="big">🔇</div><div class="lbl">Wyciszony</div>`, muted, ()=>{ muted=true; if('speechSynthesis'in window)speechSynthesis.cancel(); renderSettings(); });
  sec('🔠 Pisownia (pisanie słów)'); g=grid();
  [['upper','DUŻE LITERY','ABC'],['mixed','Duże i małe','Abc']].forEach(o=>card(g,`<div class="big" style="font-family:var(--fhead);font-weight:700;color:var(--violet)">${o[2]}</div><div class="lbl">${o[1]}</div>`, state.letterCase===o[0], ()=>{ state.letterCase=o[0]; save(); renderSettings(); say(o[0]==='upper'?'Wielkie litery':'Duże i małe litery'); }));
  sec('✏️ Czcionka'); g=grid();
  FONT_ORDER.forEach(k=>{ const it=FONTS[k]; card(g,`<div class="fontprev"><div class="fp-h" style="font-family:${it.head};color:var(--text)">Emilka 123</div><div class="fp-b" style="font-family:${it.body}">Brawo, super!</div></div><div class="lbl">${it.name}</div>`, state.font===k, ()=>{ state.font=k; save(); applyLook(); renderSettings(); }); });

  pls.forEach(v=>{ const nm=v.name.replace('Microsoft ','').replace(' - Polish (Poland)','').replace(' (Natural)','✨'); card(g,`<div class="big">🎙️</div><div class="lbl">${nm}</div>`, state.voiceName===v.name, ()=>{ state.voiceName=v.name; save(); pickVoice(); renderSettings(); say('Cześć! Tak będę do ciebie mówić.'); }); });
  if(!pls.length){ const d=document.createElement('div'); d.style.cssText='padding:8px 14px;color:var(--muted);font-size:14px;max-width:360px'; d.textContent='Brak dodatkowych polskich głosów. Możesz doinstalować polski głos (np. Premium) w ustawieniach urządzenia.'; body.appendChild(d); }
  sec('🗑️ Postępy'); const rb=document.createElement('button'); rb.className='opt tf-next'; rb.style.cssText='display:block;margin:6px 0;max-width:300px;flex-basis:auto'; rb.textContent='Wyczyść postępy i gwiazdki'; rb.onclick=()=>{ if(confirm('Na pewno wyczyścić cały postęp, gwiazdki i osiągnięcia?')){ state.progress={podstawowy:{},zaawansowany:{},trudny:{}}; state.stars=0; state.ach={}; state.stats={}; save(); updateStarUI(); renderWorldList(); renderSettings(); toast('Wyczyszczono postępy'); } }; body.appendChild(rb);
}

/* ---------- Navigation ---------- */
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $(id).classList.add('on'); $('repeatBtn').style.display=id==='game'?'flex':'none'; }
function applyName(){ const e=$('hiName'); if(e)e.textContent=state.childName||'Emilka'; }
function goHome(){ if('speechSynthesis'in window)speechSynthesis.cancel(); applyName(); renderWorldList(); renderPath(); updateModeUI(); show('home'); }

/* ---------- Kategorie (kafelki) ---------- */
const CATS_HOME=[
  {w:'letters', name:'Literki', emoji:'✏️', col:['#ff6fb0','#ff3d8e'], leg:'#c41f6b'},
  {w:'numbers', name:'Liczby', emoji:'🔢', col:['#46c8f5','#1f8fc4'], leg:'#15688f'},
  {w:'logic', name:'Zagadki', emoji:'🧩', col:['#b06bff','#8338d6'], leg:'#5e22a0'},
  {w:'truefalse', name:'Prawda / Fałsz', emoji:'💡', col:['#34d6c0','#159c8b'], leg:'#0e6f63'},
];
function catProgress(w){ if(w==='truefalse'){ let d=0; TF_THEMES.forEach(t=>d+=Object.keys(prog('tf:'+t.key)).length); return [d,TOTAL*TF_THEMES.length]; } return [Object.keys(prog(w)).length,TOTAL]; }
function renderWorldList(){ const g=$('wlist'); if(!g)return; g.innerHTML='';
  CATS_HOME.forEach(c=>{ const pr=catProgress(c.w), pct=Math.round(pr[0]/pr[1]*100);
    const b=document.createElement('button'); b.className='ctile';
    b.style.background='linear-gradient(160deg,'+c.col[0]+','+c.col[1]+')'; b.style.setProperty('--leg',c.leg);
    b.innerHTML=`<span class="ct-ic">${EMO(c.emoji)}</span><span class="ct-n">${c.name}</span>`
      +`<span class="ct-p">⭐ ${pr[0]}/${pr[1]}</span><span class="ct-bar"><i style="width:${pct}%"></i></span>`;
    b.onclick=()=>{ unlockAudio(); if(c.w==='truefalse')showTFMenu(); else openMap(c.w); }; g.appendChild(b); }); }
function showTFMenu(){ show('tfmenu'); renderTFMenu(); }
function renderTFMenu(){ const g=$('tfGrid'); g.innerHTML='';
  TF_THEMES.forEach(t=>{ const cat='tf:'+t.key, done=Object.keys(prog(cat)).length;
    const b=document.createElement('button'); b.className='world'; b.style.background='linear-gradient(160deg,'+t.col[0]+','+t.col[1]+')'; b.style.setProperty('--leg',t.leg);
    b.innerHTML='<span class="ico">'+t.emoji+'</span>'+t.name+'<span class="wsub">'+done+'/'+TOTAL+' ⭐</span>';
    b.onclick=()=>{ unlockAudio(); openMap(cat); }; g.appendChild(b); }); }

/* ---------- Główna ścieżka nauczania (program) ---------- */
const PROGRAM=[
 {t:'Pierwsze litery',i:'✏️',tasks:[['letters','letterlesson',3],['letters','l2p',3],['numbers','count',3],['logic','oddcolor',3],['letters','p2l',4]]},
 {t:'Liczymy do 5',i:'🔢',tasks:[['numbers','count',4],['numbers','group',5],['logic','same',3],['letters','l2p',4],['numbers','largest',5]]},
 {t:'Kształty i pary',i:'🧩',tasks:[['logic','oddshape',4],['logic','pairs',5],['letters','missing',5],['numbers','count',5],['logic','bigsmall',4]]},
 {t:'Słowa z obrazków',i:'🔤',tasks:[['letters','matchpic',7],['letters','missing',6],['numbers','group',6],['logic','pattern',6],['letters','p2l',6]]},
 {t:'Liczby i grupy',i:'🧮',tasks:[['numbers','matchgrp',8],['numbers','largest',8],['logic','oddcat',8],['letters','l2p',7],['numbers','count',7]]},
 {t:'Mądra Sowa',i:'🦉',tasks:[['tf','zwierzeta',6],['logic','pattern',7],['letters','matchpic',8],['numbers','group',8],['tf','przyroda',6]]},
 {t:'Dodawanie',i:'➕',tasks:[['numbers','add',12],['numbers','largest',9],['letters','spell',11],['logic','orderobj',8],['numbers','matchgrp',9]]},
 {t:'Układanki',i:'📐',tasks:[['logic','ordersize',11],['numbers','order',10],['letters','missing',9],['logic','oddcat',10],['logic','pattern',9]]},
 {t:'Piszemy słowa',i:'⌨️',tasks:[['letters','spell',12],['letters','matchpic',10],['numbers','add',13],['logic','pattern',10],['letters','missing',11]]},
 {t:'Odejmowanie',i:'➖',tasks:[['numbers','sub',16],['numbers','add',14],['logic','ordersize',12],['letters','spell',12],['numbers','order',12]]},
 {t:'Mały mistrz',i:'🏅',tasks:[['numbers','missadd',20],['letters','spell',13],['logic','ordersize',13],['tf','kosmos',8],['numbers','sub',16]]},
 {t:'Świat zwierząt',i:'🦁',tasks:[['tf','zwierzeta',8],['logic','pairs',8],['letters','matchpic',11],['logic','oddcat',11],['numbers','group',9]]},
 {t:'Mała matematyczka',i:'🧠',tasks:[['numbers','add',15],['numbers','sub',17],['numbers','missadd',21],['numbers','order',13],['logic','ordersize',13]]},
 {t:'Litery i słowa',i:'📚',tasks:[['letters','spell',14],['letters','missing',12],['letters','matchpic',12],['letters','l2p',10],['letters','p2l',10]]},
 {t:'Kosmiczna podróż',i:'🚀',tasks:[['tf','kosmos',9],['numbers','missadd',22],['logic','pattern',11],['letters','spell',14],['tf','przyroda',8]]},
 {t:'Detektyw zagadek',i:'🔍',tasks:[['logic','oddcat',12],['logic','ordersize',14],['logic','pattern',12],['logic','orderobj',10],['logic','pairs',9]]},
 {t:'Ja i mój dom',i:'🏠',tasks:[['tf','czlowiek',8],['letters','matchpic',12],['numbers','add',16],['logic','oddcat',12],['tf','zwierzeta',9]]},
 {t:'Wielka przygoda',i:'🌟',tasks:[['numbers','missadd',23],['letters','spell',15],['logic','ordersize',15],['numbers','sub',18],['tf','madra',9]]},
 {t:'Mistrzyni wiedzy',i:'👑',tasks:[['tf','madra',10],['numbers','missadd',24],['letters','spell',16],['logic','ordersize',16],['numbers','sub',19]]},
];
function progDone(){ return state.program[state.mode]||0; }
function renderPath(){ const g=$('pathScroll'); if(!g)return; g.innerHTML='';
  const cur=progDone();
  PROGRAM.forEach((L,i)=>{ const b=document.createElement('button');
    let cls='path-node'; if(i<cur)cls+=' done'; else if(i===cur)cls+=' cur'; else cls+=' locked'; b.className=cls;
    if(i===cur){ b.innerHTML=`<span class="pn-ic">${L.i}</span><span class="pn-t">${L.t}</span><span class="pn-go">Start ▶</span>`; }
    else{ const badge=i<cur?'<span class="pn-badge">✓</span>':'<span class="pn-badge">🔒</span>';
      b.innerHTML=`${badge}<span class="pn-ic">${L.i}</span><span class="pn-t">${L.t}</span><span class="pn-d">${i<cur?'Lekcja '+(i+1):'🔎 Podgląd'}</span>`; }
    b.onclick=()=>{ unlockAudio(); startProgram(i, i>cur); };
    g.appendChild(b); });
  const ce=g.querySelector('.path-node.cur'); if(ce)g.scrollLeft=Math.max(0, ce.offsetLeft-16);
}
function startProgram(i,preview){ const L=PROGRAM[i]; levelState={cat:'__prog', progIdx:i, demo:L.tasks, qi:0, wrong:0, usedTF:new Set(), isProgram:true, preview:!!preview, modeScale:true, seqLabel:(preview?'🔎 Podgląd: ':'Lekcja '+(i+1)+' • ')+(preview?L.t:'')};
  show('game'); $('backBtn').onclick=goHome; $('pips').innerHTML='';
  setBubble((preview?'Podgląd lekcji: ':'')+L.t+'!'); say((preview?'Podgląd. ':'')+L.t+(preview?'':'. Zaczynamy!')); setTimeout(demoStep,500); }
function finishProgram(){ const i=levelState.progIdx, wrong=levelState.wrong;
  if(levelState.preview){ say('Koniec podglądu lekcji! Brawo.'); goHome(); return; }
  const rating= wrong===0?3 : wrong<=2?2:1;
  const first=(i===progDone()); let gained=0;
  if(first){ state.program[state.mode]=i+1; gained=rating; gainStars(gained); }
  dayRec().levels++; const r=dayRec(); r.stars=(r.stars||0)+gained; save(); checkAch();
  const hasNext=(i+1)<PROGRAM.length;
  $('levelDone').innerHTML=`<div class="ld-card"><h2>Lekcja ukończona!</h2>
    <div class="ld-stars">${'⭐'.repeat(rating)}${'<i>⭐</i>'.repeat(3-rating)}</div>
    <div class="ld-sub">${first?('Świetna robota!  +'+gained+' ⭐'):'(lekcja już zaliczona)'}</div>
    <div class="ld-btns"><button class="ld-btn ld-map">🏠 Ekran główny</button>${hasNext?'<button class="ld-btn ld-next">Następna ▶</button>':''}</div></div>`;
  $('levelDone').classList.add('on');
  say(first?'Brawo! Lekcja ukończona!':'Świetnie, powtórzona!');
  $('levelDone').querySelector('.ld-map').onclick=()=>{ $('levelDone').classList.remove('on'); goHome(); };
  const nx=$('levelDone').querySelector('.ld-next'); if(nx)nx.onclick=()=>{ $('levelDone').classList.remove('on'); startProgram(i+1); };
}

renderWorldList(); renderPath();

function updateModeUI(){ const el=$('modeBtnLabel'); if(el)el.textContent=MODE_LABEL[state.mode];
  document.querySelectorAll('#modeMenu .dd-opt').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode)); }

document.querySelectorAll('#modeMenu .dd-opt').forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); unlockAudio();
  state.mode=b.dataset.mode; save(); updateModeUI(); $('modeMenu').classList.remove('on');
  renderWorldList(); renderPath(); say(MODE_NAMES[state.mode]); }; });
document.querySelectorAll('#wdTabs .tab').forEach(t=>{ t.onclick=()=>{ document.querySelectorAll('#wdTabs .tab').forEach(x=>x.classList.remove('on')); t.classList.add('on'); wdTab=t.dataset.tab; renderWardrobe(); }; });
$('speakBtn').onclick=()=>{ muted=!muted; $('speakBtn').textContent=muted?'🔇':'🔊'; if(!muted){ unlockAudio(); say('Dźwięk włączony'); } else if('speechSynthesis'in window)speechSynthesis.cancel(); };

/* ---------- Confetti ---------- */
const cv=$('confetti'), ctx=cv.getContext('2d'); let parts=[], raf=null;
function sizeCanvas(){ cv.width=innerWidth; cv.height=innerHeight; } addEventListener('resize',sizeCanvas); sizeCanvas();
function confetti(){ cv.style.display='block'; parts=[]; const cols=['#ff4d9d','#22bfe6','#ffc83d','#9b59e6','#58cc62','#ff7ac6'];
  for(let i=0;i<80;i++)parts.push({x:innerWidth/2,y:innerHeight*0.4,vx:(Math.random()-.5)*14,vy:Math.random()*-12-4,g:.4+Math.random()*.3,s:6+Math.random()*8,c:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-.5)*.4,life:0});
  if(!raf)raf=requestAnimationFrame(tick); }
function tick(){ ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
    if(p.y<cv.height+30&&p.life<160){ alive=true; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); } });
  if(alive)raf=requestAnimationFrame(tick); else { raf=null; ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; } }

/* ---------- Audio unlock + zoom guard ---------- */
let audioUnlocked=false;
function unlockAudio(){ if(audioUnlocked||!('speechSynthesis'in window))return; try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); audioUnlocked=true; pickVoice(); }catch(e){} }
document.body.addEventListener('pointerdown',unlockAudio,{once:true});
document.addEventListener('gesturestart',e=>e.preventDefault());
let lastTouch=0; document.addEventListener('touchend',e=>{ const n=Date.now(); if(n-lastTouch<300)e.preventDefault(); lastTouch=n; },{passive:false});

/* ---------- Init ---------- */
applyLook(); applyName(); updateStarUI(); checkAch(); updateModeUI();
